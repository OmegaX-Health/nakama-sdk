name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  deployments: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v5 as of 2026-04-27.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Verify release tag is on main
        shell: bash
        run: |
          set -euo pipefail
          tag_commit="$(git rev-parse HEAD)"
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "Release tag commit ${tag_commit} is not reachable from origin/main."
            exit 1
          fi

      - name: Setup Node.js
        # actions/setup-node@v5 as of 2026-04-27.
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 20
          cache: npm

      - name: Install pinned gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.24.2"
          asset="gitleaks_${version}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/${asset}"
          curl -fsSL "${url}" -o "/tmp/${asset}"
          echo "fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e  /tmp/${asset}" | sha256sum -c -
          tar -xzf "/tmp/${asset}" -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Secret scan (gitleaks config)
        run: node scripts/check-secrets.mjs

      - name: Install-script allowlist
        run: node scripts/check-install-scripts.mjs

      - name: Install dependencies
        run: npm ci

      - name: Clone protocol artifact target
        env:
          OMEGAX_PROTOCOL_TOKEN: ${{ secrets.OMEGAX_PROTOCOL_READ_TOKEN || github.token }}
        run: |
          set -euo pipefail
          commit="$(node -p "require('./SDK_RUNTIME.json').protocol.bindingRefreshCommit")"
          git clone --filter=blob:none --no-checkout --depth 1 \
            "https://x-access-token:${OMEGAX_PROTOCOL_TOKEN}@github.com/OmegaX-Health/omegax-protocol.git" \
            ../omegax-protocol
          git -C ../omegax-protocol fetch --depth 1 origin "${commit}"
          git -C ../omegax-protocol checkout --detach FETCH_HEAD

      - name: Release governance
        env:
          GITHUB_TOKEN: ${{ secrets.OMEGAX_GOVERNANCE_READ_TOKEN }}
          OMEGAX_REQUIRE_GITHUB_GOVERNANCE: '1'
        run: npm run security:release-governance

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Docs consistency
        run: npm run docs:check

      - name: Generated API docs consistency
        run: npm run docs:api:check

      - name: Clone docs repo for strict ancestry check
        env:
          OMEGAX_DOCS_TOKEN: ${{ secrets.OMEGAX_DOCS_READ_TOKEN || github.token }}
        run: |
          git clone --filter=blob:none --no-checkout --depth 200 \
            "https://x-access-token:${OMEGAX_DOCS_TOKEN}@github.com/OmegaX-Health/omegax-docs.git" \
            ../omegax-docs

      - name: Docs sync parity (strict)
        env:
          OMEGAX_DOCS_REPO_DIR: ../omegax-docs
        run: npm run docs:sync:check:strict

      - name: Runtime manifest consistency
        run: npm run runtime:check

      - name: Protocol artifact parity
        env:
          OMEGAX_PROTOCOL_REPO_STRICT_HEAD: '1'
        run: npm run protocol:artifact:check

      - name: Security audit (prod dependencies)
        run: npm run audit:prod

      - name: Dry-run package
        run: npm pack --dry-run

      - name: Package manifest allowlist
        run: npm run security:package

      - name: Developer experience smoke
        run: npm run dx:smoke

      - name: Consumer dogfood smoke
        env:
          OMEGAX_DOGFOOD_SKIP_TEMPLATES: '1'
        run: npm run dogfood:consumer

      - name: CLI smoke
        run: npm run cli:check

      - name: Template smoke
        run: npm run templates:check

  publish:
    runs-on: ubuntu-latest
    needs: verify
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        # actions/checkout@v5 as of 2026-04-27.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Setup Node.js
        # actions/setup-node@v5 as of 2026-04-27.
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Build verified tarball contents
        run: npm run build

      - name: Package manifest allowlist
        run: npm run security:package

      - name: Validate release tag and npm availability
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git fetch --force origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
          npm run security:release-tag

      - name: Publish to npm
        run: npm publish --ignore-scripts --access public --provenance

      - name: Post-publish clean install/import smoke
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          smoke_dir="$(mktemp -d)"
          cd "${smoke_dir}"
          npm init -y >/dev/null
          max_attempts=8
          for attempt in $(seq 1 "${max_attempts}"); do
            if npm install "@nakama-health/protocol-sdk@${version}" --ignore-scripts; then
              break
            fi
            if [[ "${attempt}" == "${max_attempts}" ]]; then
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "Package @nakama-health/protocol-sdk@${version} is not visible to npm install yet; retrying in ${sleep_seconds}s (${attempt}/${max_attempts})."
            sleep "${sleep_seconds}"
          done
          node --input-type=module -e "const sdk = await import('@nakama-health/protocol-sdk'); if (!sdk.PROTOCOL_PROGRAM_ID || !sdk.createSafeProtocolClient) throw new Error('SDK import smoke failed');"
